<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prairie Dog Finder</title>
    <script type="module" src="/src/main.ts"></script>
  </head>
  <body>
    <main id="app">
      <section class="workspace">
        <header class="topbar">
          <div>
            <h1>Prairie Dog Finder</h1>
          </div>
          <div class="status-cluster">
            <button id="radarToggle" class="radar-toggle" type="button" aria-pressed="false">
              Radar
            </button>
            <span id="connectionStatus" class="status status-waiting">Connecting</span>
          </div>
        </header>

        <section class="map-shell" aria-label="Prairie dog locator map">
          <svg id="map" viewBox="0 0 960 610" role="img" aria-label="United States map with prairie dog signals"></svg>
          <div id="hoverPreview" class="hover-preview" aria-live="polite" aria-hidden="true">
            <div class="hover-preview-image-shell">
              <img id="hoverPreviewImage" alt="" />
            </div>
            <div class="hover-preview-meta">
              <strong id="hoverPreviewTitle"></strong>
              <span id="hoverPreviewPlace"></span>
              <time id="hoverPreviewTime"></time>
              <a id="hoverPreviewSource" href="#" target="_blank" rel="noreferrer">Open observation</a>
            </div>
            <button id="hoverPreviewClose" class="hover-preview-close" type="button" aria-label="Close observation preview">Close</button>
          </div>
          <div id="observationRail" class="observation-rail" aria-label="Prairie dog observations">
            <div id="observationList" class="observation-list"></div>
          </div>
          <aside id="prairieFeed" class="prairie-feed" aria-label="Prairie feed">
            <div class="prairie-feed-header">
              <h2>Prairie Feed</h2>
              <span>Latest signals</span>
            </div>
            <ol id="prairieFeedList" class="prairie-feed-list"></ol>
          </aside>
          <div id="emptyState" class="empty-state">
            <strong>Listening for prairie dog signals</strong>
            <span>Live public observations from iNaturalist.</span>
          </div>
        </section>
      </section>
    </main>
  </body>
</html>
